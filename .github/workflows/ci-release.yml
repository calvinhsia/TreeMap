name: CI & Release

on:
  push:
    branches: [ work, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ work, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['10.0.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  publish-artifacts:
    name: Publish artifacts (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish TreeMap/TreeMap.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o ./artifacts/${{ matrix.rid }}
        shell: bash
      - name: Prepare artifact (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Move-Item ./artifacts/${{ matrix.rid }}/TreeMap.exe ./artifacts/TreeMap-${{ matrix.rid }}.exe
      - name: Prepare artifact (Linux/macOS)
        if: matrix.rid != 'win-x64'
        shell: bash
        run: mv ./artifacts/${{ matrix.rid }}/TreeMap ./artifacts/TreeMap-${{ matrix.rid }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeMap-${{ matrix.rid }}
          path: ./artifacts/TreeMap-${{ matrix.rid }}*

  create-release:
    name: Create GitHub Release and attach artifacts
    needs: publish-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - name: List artifacts
        run: find ./artifacts -type f
      - name: Create release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## TreeMap ${{ github.ref_name }}

            ### Downloads
            Download the single executable for your platform (no installation required):
            - **Windows (x64)**: `TreeMap-win-x64.exe`
            - **Linux (x64)**: `TreeMap-linux-x64` (run `chmod +x` first)
            - **macOS (x64)**: `TreeMap-osx-x64` (run `chmod +x` first)
          artifacts: ./artifacts/*
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI & Release

on:
  push:
    branches: [ work, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ work, main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['10.0.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  publish-artifacts:
    name: Publish artifacts (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish TreeMap/TreeMap.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true /p:PublishSingleFile=true -o ./artifacts/${{ matrix.rid }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeMap-${{ matrix.rid }}
          path: ./artifacts/${{ matrix.rid }}

  create-release:
    name: Create GitHub Release and attach artifacts
    needs: publish-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TreeMap-win-x64
          path: ./artifacts/win-x64 || true
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TreeMap-linux-x64
          path: ./artifacts/linux-x64 || true
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TreeMap-osx-x64
          path: ./artifacts/osx-x64 || true
      - name: Create release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
          files: |
            ./artifacts/win-x64/*
            ./artifacts/linux-x64/*
            ./artifacts/osx-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

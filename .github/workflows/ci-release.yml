name: CI & Release

on:
  push:
    branches: [ work, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ work, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet: ['10.0.x']
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  publish-artifacts:
    name: Publish artifacts (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish TreeMap/TreeMap.csproj -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            /p:IncludeAllContentForSelfExtract=true \
            -o ./artifacts/${{ matrix.rid }}
      - name: Prepare artifact
        run: |
          cd ./artifacts/${{ matrix.rid }}
          # Rename exe for clarity (Windows has .exe, others don't)
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            mv TreeMap.exe ../TreeMap-${{ matrix.rid }}.exe
          else
            mv TreeMap ../TreeMap-${{ matrix.rid }}
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeMap-${{ matrix.rid }}
          path: ./artifacts/TreeMap-${{ matrix.rid }}*

  create-release:
    name: Create GitHub Release and attach artifacts
    needs: publish-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false
      - name: List artifacts
        run: find ./artifacts -type f
      - name: Create release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## TreeMap ${{ github.ref_name }}

            ### Downloads
            Download the single executable for your platform (no installation required):
            - **Windows (x64)**: `TreeMap-win-x64.exe`
            - **Linux (x64)**: `TreeMap-linux-x64` (run `chmod +x` first)
            - **macOS (x64)**: `TreeMap-osx-x64` (run `chmod +x` first)
          artifacts: ./artifacts/**/*
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
